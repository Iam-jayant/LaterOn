[tool.poetry]
name = "lateron-contracts"
version = "0.1.0"
description = "LaterOn Algorand contract and protocol rules scaffolding"
authors = ["LaterOn Team"]
packages = [{ include = "lateron", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"

[tool.pytest.ini_options]
pythonpath = ["src"]

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"
